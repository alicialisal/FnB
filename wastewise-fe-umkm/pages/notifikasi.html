<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .phone-frame {
        width: 100%;
        max-width: 375px;
        height: 812px;
        background: white;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 20px;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>

  <body>
    <div class="phone-frame flex flex-col h-full">
      <!-- HEADER -->
      <div class="mt-2 mb-2">
        <div class="flex items-center">
          <!-- BACK BUTTON -->
          <button
            onclick="history.back()"
            class="w-10 h-10 rounded-full bg-[#f28a2c] flex items-center justify-center text-white text-xl shadow"
          >
            ‹
          </button>

          <h1 class="text-2xl font-bold text-[#003d2b] ml-4">Notifikasi</h1>
        </div>
      </div>

      <!-- CONTENT WRAPPER -->
      <div class="flex-1 flex flex-col">
        <!-- TAB -->
        <div class="flex bg-gray-100 p-2 rounded-full w-full">
          <button
            class="flex-1 px-2 py-1 rounded-full bg-[#003d2b] text-white text-sm"
          >
            Semua
          </button>

          <button class="flex-1 px-2 py-1 rounded-full text-gray-600 text-sm">
            Pesanan
          </button>

          <button class="flex-1 px-2 py-1 rounded-full text-gray-600 text-sm">
            Promosi
          </button>
        </div>

        <!-- NOTIFICATION LIST -->
        <div class="mt-4 space-y-3">
          <!-- NOTIF 1 -->
          <div
            class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm flex items-start gap-3"
          >
            <!-- ICON -->
            <div
              class="w-10 h-10 bg-orange-100 text-orange-500 flex items-center justify-center rounded-full"
            >
              <i class="fa-solid fa-bell"></i>
            </div>

            <!-- TEXT -->
            <div class="flex-1">
              <p class="text-sm font-semibold text-gray-800">
                Pesanan Baru Masuk
              </p>
              <p class="text-xs text-gray-500">
                Pesanan #21 dari Andi telah dibuat
              </p>
              <p class="text-xs text-gray-400 mt-1">1 menit yang lalu</p>
            </div>
          </div>

          <!-- NOTIF 2 -->
          <div
            class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm flex items-start gap-3"
          >
            <div
              class="w-10 h-10 bg-green-100 text-green-600 flex items-center justify-center rounded-full"
            >
              <i class="fa-solid fa-check"></i>
            </div>

            <div class="flex-1">
              <p class="text-sm font-semibold text-gray-800">Pesanan Selesai</p>
              <p class="text-xs text-gray-500">
                Pesanan #18 sudah selesai diproses
              </p>
              <p class="text-xs text-gray-400 mt-1">10 menit yang lalu</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
