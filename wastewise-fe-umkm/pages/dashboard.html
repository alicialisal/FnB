========================= -->
<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Inter",sans-serif;
}

body{
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* WRAPPER SAMA SEPERTI LOGIN */
.mobile-screen{
  width:100%;
  max-width:400px;
  min-height:100vh;
  background:#f3f3f3;
  position:relative;
  overflow:hidden;
}

/* hilangkan scrollbar */
.hide-scroll::-webkit-scrollbar{
  display:none;
}
.hide-scroll{
  -ms-overflow-style:none;
  scrollbar-width:none;
}
</style>
</head>

<body>

<!-- WRAPPER -->
<div class="mobile-screen">

    <!-- HEADER -->
    <div class="px-7 pt-14 flex justify-between items-center">
        <div>
            <h1 class="text-[20px] font-bold text-[#004b34]">
              Halo, Warung AW!
            </h1>

            <p class="mt-5 text-[18px] font-semibold text-[#222]">
              Pesanan untuk Saya
            </p>
        </div>

        <button class="w-12 h-12 rounded-full bg-[#f28a2c] text-white text-xl">
          🔔
        </button>
    </div>

    <!-- FILTER -->
    <div class="flex gap-3 px-7 mt-6 overflow-auto hide-scroll">
        <button class="px-6 py-2 rounded-full bg-[#004b34] text-white text-sm font-medium whitespace-nowrap">
          Semua
        </button>

        <button class="px-5 py-2 rounded-full bg-[#e8efea] text-[#111] text-sm whitespace-nowrap">
          Pesanan Baru
        </button>

        <button class="px-5 py-2 rounded-full bg-[#e8efea] text-[#111] text-sm whitespace-nowrap">
          Dipersiapkan
        </button>
    </div>

    <!-- CONTENT -->
    <div class="px-5 mt-6 pb-32 space-y-5 overflow-y-auto max-h-[calc(100vh-210px)]">

        <!-- CARD 1 -->
        <div class="bg-white rounded-3xl shadow-md border border-gray-200 p-5">
            <div class="flex justify-between items-start">

                <div class="bg-[#f28a2c] text-white text-xs px-5 py-1 rounded-full">
                  Pesanan Baru
                </div>

                <div class="text-right">
                    <h2 class="font-bold text-2xl text-[#222]">#20</h2>
                    <p class="text-gray-500 text-sm">08.30</p>
                </div>

            </div>

            <div class="mt-3">
                <p class="font-semibold">Jonathan</p>

                <div class="mt-2 text-gray-700 text-sm space-y-1">
                    <div class="flex justify-between">
                        <span>Nasi Goreng</span>
                        <span>x1</span>
                    </div>

                    <div class="flex justify-between">
                        <span>Mie Goreng</span>
                        <span>x1</span>
                    </div>
                </div>

                <div class="border-b border-dotted border-gray-400 mt-3"></div>

                <div class="mt-3 flex justify-between items-center">
                    <button class="border border-[#004b34] text-[#004b34] px-5 py-2 rounded-xl font-semibold text-sm">
                      Siapkan Pesanan
                    </button>

                    <p class="font-bold text-xl">Rp 24.000</p>
                </div>
            </div>
        </div>

        <!-- CARD 2 -->
        <div class="bg-white rounded-3xl shadow-md border border-gray-200 p-5">
            <div class="flex justify-between items-start">

                <div class="bg-[#f28a2c] text-white text-xs px-5 py-1 rounded-full">
                  Pesanan Baru
                </div>

                <div class="text-right">
                    <h2 class="font-bold text-2xl text-[#222]">#21</h2>
                    <p class="text-gray-500 text-sm">08.45</p>
                </div>

            </div>

            <div class="mt-3">
                <p class="font-semibold">Jonathan</p>

                <div class="mt-2 text-gray-700 text-sm space-y-1">
                    <div class="flex justify-between">
                        <span>Nasi Goreng</span>
                        <span>x1</span>
                    </div>

                    <div class="flex justify-between">
                        <span>Mie Ayam</span>
                        <span>x2</span>
                    </div>
                </div>

                <div class="border-b border-dotted border-gray-400 mt-3"></div>

                <div class="mt-3 flex justify-between items-center">
                    <button class="border border-[#004b34] text-[#004b34] px-5 py-2 rounded-xl font-semibold text-sm">
                      Siapkan Pesanan
                    </button>

                    <p class="font-bold text-xl">Rp 30.000</p>
                </div>
            </div>
        </div>

    </div>

    <!-- BOTTOM NAV -->
    <div class="absolute bottom-0 left-0 right-0 bg-[#eaf0ed] rounded-t-3xl shadow-xl px-8 py-4">
        <div class="flex justify-between text-center text-sm">

            <button class="text-[#004b34] font-semibold">
                <div class="text-2xl">🏠</div>
                Beranda
            </button>

            <button class="text-gray-600">
                <div class="text-2xl">📄</div>
                Menu
            </button>

            <button class="text-gray-600">
                <div class="text-2xl">👤</div>
                Profil
            </button>

        </div>
    </div>

</div>

</body>
</html>
