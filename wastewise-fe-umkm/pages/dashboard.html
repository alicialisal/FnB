<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .phone-frame {
        width: 100%;
        max-width: 375px;
        height: 812px;
        background: white;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 20px;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>

  <body>
    <div class="phone-frame flex flex-col h-full">
      <!-- HEADER -->
      <div class="mt-2 mb-2">
        <div class="flex items-center justify-between">
          <h1 class="text-2xl font-bold text-[#003d2b]">Halo, Warung AW!</h1>

          <div
            class="w-11 h-11 bg-[#f28a2c] rounded-full flex items-center justify-center shadow"
          >
            <i class="fa-solid fa-bell text-white text-lg"></i>
          </div>
        </div>

        <p class="text-base text-black font-semibold mt-4">
          Pesanan untuk Saya
        </p>
      </div>

      <!-- CONTENT WRAPPER -->
      <div class="flex-1 flex flex-col">
        <!-- TAB -->
        <div class="flex bg-gray-100 p-2 rounded-full w-full">
          <button
            class="flex-1 px-2 py-1 rounded-full bg-[#003d2b] text-white text-sm"
          >
            Semua
          </button>

          <button class="flex-1 px-2 py-1 rounded-full text-gray-600 text-sm">
            Pesanan Baru
          </button>

          <button class="flex-1 px-2 py-1 rounded-full text-gray-600 text-sm">
            Dipersiapkan
          </button>
        </div>

        <!-- CARD -->
        <div class="mt-6 flex justify-center">
          <div
            class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 w-full"
          >
            <div class="flex justify-between items-center mb-3">
              <span
                class="bg-orange-500 text-white text-xs px-3 py-1 rounded-full"
              >
                Pesanan Baru
              </span>
              <span class="text-lg font-bold">#20</span>
            </div>

            <div class="flex justify-between items-center mb-3">
              <h2 class="text-base font-semibold">Jonathan</h2>
              <span class="text-gray-400 text-sm">08.30</span>
            </div>

            <div class="text-sm space-y-1 mb-3">
              <div class="flex justify-between text-gray-600">
                <span>Nasi Goreng</span>
                <span>x1</span>
              </div>

              <div class="flex justify-between text-gray-600">
                <span>Mie Goreng</span>
                <span>x1</span>
              </div>
            </div>

            <div class="border-t pt-2 flex justify-end">
              <span class="font-bold">Rp 24.000</span>
            </div>

            <div class="flex justify-end mt-3">
              <button
                class="border border-emerald-800 text-emerald-800 text-sm px-4 py-2 rounded-lg"
              >
                Siapkan Pesanan
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- NAVBAR INJECT -->
      <div id="navbar"></div>
    </div>

    <!-- SCRIPT LOGIC -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        fetch("../components/navbar.html")
          .then((res) => res.text())
          .then((html) => {
            document.getElementById("navbar").innerHTML = html;

            setTimeout(() => {
              const path = window.location.pathname;
              const buttons = document.querySelectorAll(".navbar-btn");

              buttons.forEach((btn) => {
                const page = btn.getAttribute("data-page");

                if (path.includes(page.replace(".html", ""))) {
                  btn.classList.remove("text-gray-500");
                  btn.classList.add("text-[#003d2b]");
                }
              });
            }, 50);
          });
      });
    </script>

  </body>
</html>
