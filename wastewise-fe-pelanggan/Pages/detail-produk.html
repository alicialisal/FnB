<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - WasteWise</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003D2B',
                        accent: '#EF8030',
                        bg: '#F8F9FA',
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }
        
        body {
            background: #e5e5e5;
        }
        
        .phone-container {
            max-width: 375px;
            min-height: 812px;
            margin: 20px auto;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            position: relative;
        }
        
        .qty-btn {
            width: 37px;
            height: 37px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .qty-btn-minus {
            background: #FEE2E2;
            color: #EF4444;
        }
        
        .qty-btn-minus:hover {
            background: #EF4444;
            color: white;
        }
        
        .qty-btn-plus {
            background: #FEF3C7;
            color: #F59E0B;
        }
        
        .qty-btn-plus:hover {
            background: #F59E0B;
            color: white;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Header -->
    <div class="flex items-center gap-4 px-6 pt-12 pb-4 bg-white sticky top-0 z-10 border-b">
        <button onclick="history.back()" 
                class="w-10 h-10 bg-accent/10 rounded-full flex items-center justify-center hover:bg-accent/20 transition">
            <i class="fas fa-arrow-left text-accent text-lg"></i>
        </button>
        <h1 class="text-xl font-bold text-primary">Detail Produk</h1>
    </div>
    
    <!-- Product Content -->
    <div class="px-6 pb-32">
        <!-- Product Image -->
        <div class="bg-gray-100 rounded-2xl h-48 flex items-center justify-center mb-6 relative overflow-hidden">
            <i class="fas fa-box-open text-6xl text-gray-400"></i>
            <!-- Stok Badge -->
            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-2 rounded-xl shadow-sm">
                <p class="text-xs text-gray-500">Stok Tersisa</p>
                <p id="stock-display" class="text-lg font-bold text-accent">5</p>
            </div>
        </div>
        
        <!-- Product Info -->
        <div class="flex justify-between items-start mb-4">
            <div>
                <h2 id="product-name" class="text-2xl font-bold text-primary mb-1">Paket 5k</h2>
                <p class="text-sm text-gray-500">Warung AW</p>
            </div>
            <span id="product-price" class="text-xl font-bold text-accent">Rp5.000</span>
        </div>
        
        <!-- Description -->
        <div class="mb-6">
            <h3 class="text-sm font-semibold text-gray-700 mb-2">Deskripsi Produk</h3>
            <p id="product-desc" class="text-sm text-gray-500 leading-relaxed">Include Nasi + Telur/Sayur</p>
        </div>
        
        <!-- Keterangan Textarea -->
        <div class="mb-6">
            <label class="text-sm font-semibold text-gray-700 mb-2 block">Keterangan</label>
            <textarea id="product-note" rows="3" 
                      class="w-full border border-gray-300 rounded-xl p-3 text-sm outline-none focus:border-accent focus:ring-2 focus:ring-accent/20 resize-none"
                      placeholder="Contoh: Tidak pakai pedas, extra nasi, dll..."></textarea>
        </div>
        
        <!-- Quantity Selector -->
        <div class="flex items-center justify-between mb-6 bg-gray-50 rounded-2xl p-4">
            <span class="text-sm font-semibold text-gray-700">Jumlah</span>
            <div class="flex items-center gap-4">
                <button onclick="decreaseQty()" class="qty-btn qty-btn-minus">
                    <i class="fas fa-minus"></i>
                </button>
                <span id="qty-display" class="text-xl font-bold text-primary w-8 text-center">0</span>
                <button onclick="increaseQty()" class="qty-btn qty-btn-plus">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>
        
        <!-- Total Price -->
        <div class="flex justify-between items-center mb-4">
            <span class="text-sm text-gray-500">Total Harga</span>
            <span id="total-price" class="text-lg font-bold text-primary">Rp0</span>
        </div>
    </div>
    
    <!-- Bottom Button -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[375px] bg-white border-t px-6 py-4 z-20 rounded-t-3xl shadow-lg">
        <button onclick="addToCartFromDetail()" 
                id="add-to-cart-btn"
                class="w-full bg-primary text-white py-4 rounded-xl font-bold hover:bg-primary/90 transition disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <i class="fas fa-shopping-bag"></i>
            <span>Tambahkan ke Keranjang</span>
        </button>
    </div>
</div>

<!-- ✅ Script path untuk file di folder Pages -->
<script src="../js/app.js"></script>

<script>
// ========== DETAIL PRODUK LOGIC ==========

let qty = 0;
let maxStock = 5;
let productName = '';
let productPrice = 0;
let productNote = '';

// Parse URL parameters
const urlParams = new URLSearchParams(window.location.search);
productName = urlParams.get('name') || 'Paket 5k';
productPrice = parseInt(urlParams.get('price')) || 5000;
maxStock = parseInt(urlParams.get('stock')) || 5;
const productDesc = urlParams.get('desc') || 'Include Nasi + Telur/Sayur';

// Update UI with product data
document.getElementById('product-name').textContent = productName;
document.getElementById('product-price').textContent = `Rp${productPrice.toLocaleString('id-ID')}`;
document.getElementById('product-desc').textContent = productDesc;
document.getElementById('stock-display').textContent = maxStock;

function increaseQty() {
    if (qty < maxStock) {
        qty++;
        updateUI();
    } else {
        alert(`Stok hanya tersisa ${maxStock}!`);
    }
}

function decreaseQty() {
    if (qty > 0) {
        qty--;
        updateUI();
    }
}

function updateUI() {
    document.getElementById('qty-display').textContent = qty;
    document.getElementById('total-price').textContent = `Rp${(qty * productPrice).toLocaleString('id-ID')}`;
    
    // Enable/disable button based on qty
    const btn = document.getElementById('add-to-cart-btn');
    if (qty > 0) {
        btn.disabled = false;
        btn.classList.remove('disabled:bg-gray-300', 'disabled:cursor-not-allowed');
    } else {
        btn.disabled = true;
        btn.classList.add('disabled:bg-gray-300', 'disabled:cursor-not-allowed');
    }
}

function addToCartFromDetail() {
    if (qty === 0) {
        alert('Pilih jumlah terlebih dahulu!');
        return;
    }
    
    productNote = document.getElementById('product-note').value;
    
    // Get cart from localStorage
    let cart = JSON.parse(localStorage.getItem('wastewise_cart')) || [];
    
    // Check if product already in cart
    const existingIndex = cart.findIndex(item => item.name === productName);
    
    if (existingIndex !== -1) {
        // Update existing item
        cart[existingIndex].qty += qty;
        cart[existingIndex].note = productNote;
    } else {
        // Add new item
        cart.push({
            name: productName,
            price: productPrice,
            qty: qty,
            note: productNote,
            addedAt: new Date().toISOString()
        });
    }
    
    // Save to localStorage
    localStorage.setItem('wastewise_cart', JSON.stringify(cart));
    
    // Update badge
    if (typeof updateBadge === 'function') {
        updateBadge();
    }
    
    // ✅ PENTING: Trigger manual storage event agar halaman lain terupdate
    window.dispatchEvent(new Event('storage'));
    
    // Success feedback & AUTO BACK
    const btn = document.getElementById('add-to-cart-btn');
    const originalHTML = btn.innerHTML;
    
    // Ubah tombol jadi hijau dengan centang
    btn.innerHTML = '<i class="fas fa-check"></i> <span>Berhasil Ditambahkan!</span>';
    btn.classList.remove('bg-primary', 'hover:bg-primary/90');
    btn.classList.add('bg-green-600');
    btn.disabled = true;
    
    // ✅ Tunggu 1 detik, lalu kembali ke halaman sebelumnya
    setTimeout(() => {
        window.history.back();
    }, 1000);
}

// Initialize UI
updateUI();
</script>

</body>
</html>
