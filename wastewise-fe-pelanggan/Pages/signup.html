<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - WasteWise Pelanggan</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
      body { background: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
      .signup-container { background: white; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 35px 25px; }
      .btn-primary { background: #003d29; color: white; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; transition: 0.2s; }
      .btn-primary:hover { background: #005c3f; }
      .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
      .input-error { border-color: #ef4444 !important; }
      .error-text { color: #ef4444; font-size: 12px; margin-top: 4px; }
    </style>
  </head>

  <body>
    <div class="signup-container">
      <h1 class="text-2xl font-bold text-[#003d2b]">Daftar</h1>
      <p class="text-sm text-gray-500 mb-6">Buat akun baru untuk melanjutkan 👋</p>

      <form id="signupForm" class="space-y-4">
        <div>
          <input type="text" id="name" placeholder="Nama Lengkap" class="w-full p-4 border rounded-xl outline-none text-sm" />
          <p id="nameError" class="error-text hidden">Nama minimal 3 karakter</p>
        </div>

        <div>
          <div id="phoneWrapper" class="flex items-center w-full p-4 border rounded-xl bg-white">
            <div class="flex items-center gap-2 pr-6 mr-6 border-r">
              <img src="https://flagcdn.com/w20/id.png" class="w-5" alt="Indonesia" />
              <span class="text-sm font-semibold">+62</span>
            </div>
            <input type="text" id="phone" placeholder="Nomor Handphone" class="w-full outline-none text-sm" />
          </div>
          <p id="phoneError" class="error-text hidden">Nomor harus angka & minimal 10 digit</p>
        </div>

        <div>
          <input type="email" id="email" placeholder="Alamat Email" class="w-full p-4 border rounded-xl outline-none text-sm" />
          <p id="emailError" class="error-text hidden">Email tidak valid</p>
        </div>

        <div>
          <div id="passwordWrapper" class="flex items-center w-full p-4 border rounded-xl bg-white">
            <input type="password" id="password" placeholder="Kata sandi" class="w-full outline-none text-sm" />
            <span onclick="togglePassword(this)" class="cursor-pointer text-gray-400">
              <i class="fa-solid fa-eye"></i>
            </span>
          </div>
          <p id="passwordError" class="error-text hidden">Password minimal 6 karakter</p>
        </div>

        <div>
          <div id="confirmPasswordWrapper" class="flex items-center w-full p-4 border rounded-xl bg-white">
            <input type="password" id="confirmPassword" placeholder="Konfirmasi kata sandi" class="w-full outline-none text-sm" />
            <span onclick="togglePassword(this)" class="cursor-pointer text-gray-400">
              <i class="fa-solid fa-eye"></i>
            </span>
          </div>
          <p id="confirmPasswordError" class="error-text hidden">Password tidak cocok</p>
        </div>

        <button type="submit" id="signupButton" class="btn-primary mt-6">Daftar</button>
      </form>

      <div class="flex items-center text-center text-xs text-gray-400 my-6">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="px-2">Atau daftar dengan</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <div class="flex justify-center gap-4 mb-6">
        <button onclick="socialRegister('google')" class="w-16 h-12 border rounded-lg hover:scale-105 transition">
          <i class="fab fa-google text-[#EA4335]"></i>
        </button>
        <button onclick="socialRegister('facebook')" class="w-16 h-12 border rounded-lg hover:scale-105 transition">
          <i class="fab fa-facebook-f text-[#1877F2]"></i>
        </button>
      </div>

      <div class="text-center text-sm text-gray-500">
        Sudah punya akun?
        <a href="../index.html" class="text-green-600 font-semibold">Masuk</a>
      </div>
    </div>

    <!-- ✅ Script path untuk file di folder Pages -->
    <script src="../js/auth.js"></script>
  </body>
</html>
