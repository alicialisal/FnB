<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pemesanan - WasteWise</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003D2B',
                        accent: '#EF8030',
                    }
                }
            }
        }
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
        body { background: #F8F9FA; }
        .phone-container { max-width: 375px; min-height: 812px; margin: 0 auto; background: white; position: relative; }
        
        .tab-btn {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #E5E7EB;
            background: #F3F4F6;
            color: #6B7280;
        }
        
        .tab-btn.active {
            background: #003D2B;
            color: white;
            border-color: #003D2B;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-berlangsung {
            background: #FFF7ED;
            color: #EF8030;
        }
        
        .status-selesai {
            background: #003D2B;
            color: white;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Header -->
    <div class="px-5 pt-12 pb-4 border-b sticky top-0 bg-white z-10">
        <h1 class="text-2xl font-bold text-primary">Riwayat Pemesanan</h1>
    </div>
    
    <!-- Tabs -->
    <div class="px-5 py-4 flex gap-2 sticky top-[88px] bg-white z-10 border-b">
        <button onclick="switchTab('semua')" id="tab-semua" class="tab-btn active">Semua</button>
        <button onclick="switchTab('berlangsung')" id="tab-berlangsung" class="tab-btn">Berlangsung</button>
        <button onclick="switchTab('selesai')" id="tab-selesai" class="tab-btn">Selesai</button>
    </div>
    
    <!-- Order List -->
    <div class="p-5 pb-24" id="order-list">
        <!-- Orders will be rendered here by JavaScript -->
    </div>
    
    <!-- Empty State -->
    <div id="empty-history" class="hidden text-center py-10">
        <div class="w-24 h-24 bg-gray-200 rounded-full mx-auto mb-4 flex items-center justify-center">
            <i class="fas fa-receipt text-4xl text-gray-400"></i>
        </div>
        <p class="text-gray-500 text-sm">Belum ada riwayat pemesanan</p>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[375px] bg-white border-t px-6 py-4 flex justify-between items-center z-20">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="cart.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition relative">
            <i class="fas fa-shopping-bag text-xl"></i>
            <span class="text-[10px] font-medium">Keranjang</span>
            <span id="cart-badge" class="hidden absolute -top-1 right-2 bg-red-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </a>
        <a href="history.html" class="flex flex-col items-center gap-1 text-primary transition">
            <i class="fas fa-receipt text-xl"></i>
            <span class="text-[10px] font-medium">Histori</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-medium">Profil</span>
        </a>
    </div>
</div>

<script src="../js/app.js"></script>

<script>
// ========== ORDER HISTORY LOGIC ==========

let currentTab = 'semua';
let orders = [];

// Sample data for demo (nanti bisa dari localStorage/backend)
const sampleOrders = [
    {
        id: 'ORD418788182',
        tenant: 'Warung AW',
        date: '17 Januari 2026 | 11:30',
        status: 'berlangsung',
        pickupTime: '17:00',
        total: 5500,
        items: 'Paket 5k x1'
    },
    {
        id: 'ORD415123456',
        tenant: 'Warung AW',
        date: '15 Januari 2026 | 11:30',
        status: 'selesai',
        pickupTime: null,
        total: 5500,
        items: 'Paket 10k x1'
    },
    {
        id: 'ORD412000789',
        tenant: 'Warung AW',
        date: '12 Januari 2026 | 14:00',
        status: 'selesai',
        pickupTime: null,
        total: 15500,
        items: 'Paket 15k x1'
    }
];

// Load orders on page load
document.addEventListener('DOMContentLoaded', function() {
    // Load from localStorage if available, otherwise use sample data
    const storedOrders = localStorage.getItem('wastewise_orders');
    orders = storedOrders ? JSON.parse(storedOrders) : sampleOrders;
    
    renderOrders();
});

function switchTab(tab) {
    currentTab = tab;
    
    // Update tab buttons
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    
    // Render filtered orders
    renderOrders();
}

function renderOrders() {
    const container = document.getElementById('order-list');
    const emptyState = document.getElementById('empty-history');
    
    // Filter orders based on current tab
    let filteredOrders = orders;
    if (currentTab === 'berlangsung') {
        filteredOrders = orders.filter(order => order.status === 'berlangsung');
    } else if (currentTab === 'selesai') {
        filteredOrders = orders.filter(order => order.status === 'selesai');
    }
    
    if (filteredOrders.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
    }
    
    emptyState.classList.add('hidden');
    
    let html = '';
    filteredOrders.forEach(order => {
        const statusBadge = order.status === 'berlangsung' 
            ? '<span class="status-badge status-berlangsung">Berlangsung</span>'
            : '<span class="status-badge status-selesai">Selesai</span>';
        
        const pickupInfo = order.status === 'berlangsung' && order.pickupTime
            ? `<p class="text-xs text-gray-500 mt-1">Ambil sebelum ${order.pickupTime}</p>`
            : '';
        
        html += `
            <div class="bg-white border border-gray-200 rounded-2xl p-4 mb-4">
                <div class="flex gap-3">
                    <img src="../assets/images/nasigoreng.png" alt="${order.tenant}" 
                         class="w-16 h-16 object-cover rounded-xl"
                         onerror="this.src='https://images.unsplash.com/photo-1603138842577-7b67493f342a?w=100&h=100&fit=crop'">
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-sm text-gray-800">${order.tenant}</h3>
                            ${statusBadge}
                        </div>
                        <p class="text-xs text-gray-500 mb-2">${order.date}</p>
                        ${pickupInfo}
                    </div>
                </div>
                <div class="flex justify-between items-center mt-3 pt-3 border-t">
                    <span class="text-xs text-gray-500">${order.items}</span>
                    <span class="font-bold text-primary text-sm">Rp${order.total.toLocaleString('id-ID')}</span>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

// Function to save order after checkout (call this from cart.html confirmOrder)
function saveOrder(orderData) {
    let orders = JSON.parse(localStorage.getItem('wastewise_orders')) || [];
    orders.unshift(orderData); // Add to beginning
    localStorage.setItem('wastewise_orders', JSON.stringify(orders));
}

// Update cart badge
if (typeof updateBadge === 'function') {
    updateBadge();
}
</script>

</body>
</html>
