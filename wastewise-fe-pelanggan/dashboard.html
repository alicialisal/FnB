<!-- File: dashboard.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasteWise - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="flex justify-center min-h-screen bg-gray-200">

    <!-- Container HP -->
    <div class="w-full max-w-[375px] bg-gray-50 h-full min-h-screen flex flex-col relative">
        
        <!-- Header -->
        <div class="bg-white p-5 rounded-b-3xl shadow-sm sticky top-0 z-10">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-bold text-gray-800">Halo, Leonard! 👋</h1>
                    <p class="text-xs text-gray-500">Mau makan apa hari ini?</p>
                </div>
                <div class="w-10 h-10 bg-gray-200 rounded-full overflow-hidden">
                    <!-- Placeholder Foto Profil -->
                    <img src="https://via.placeholder.com/40" alt="Profile">
                </div>
            </div>
            
            <!-- Search Bar -->
            <div class="bg-gray-100 rounded-xl flex items-center px-3 py-2">
                <i class="fas fa-search text-gray-400 mr-2"></i>
                <input type="text" placeholder="Cari makanan..." class="bg-transparent text-sm w-full outline-none">
            </div>
        </div>

        <!-- Content (List Makanan) -->
        <div class="p-5 flex-1 overflow-y-auto">
            
            <h2 class="text-lg font-bold text-gray-800 mb-3">Rekomendasi</h2>
            
            <!-- Grid Produk -->
            <div class="grid grid-cols-2 gap-4">
                
                <!-- Produk 1 -->
                <a href="detail.html" class="bg-white p-3 rounded-xl shadow-sm hover:shadow-md transition block">
                    <div class="h-24 bg-gray-200 rounded-lg mb-2 overflow-hidden">
                        <img src="https://source.unsplash.com/100x100/?food" class="w-full h-full object-cover">
                    </div>
                    <h3 class="font-bold text-sm text-gray-800">Paket 5k</h3>
                    <p class="text-xs text-gray-500 mb-2">Warung AW</p>
                    <div class="flex justify-between items-center">
                        <span class="text-green-600 font-bold text-sm">Rp5.000</span>
                        <button class="bg-green-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center" onclick="addToCart('Paket 5k', 5000)">+</button>
                    </div>
                </a>

                <!-- Produk 2 -->
                <a href="detail.html" class="bg-white p-3 rounded-xl shadow-sm hover:shadow-md transition block">
                    <div class="h-24 bg-gray-200 rounded-lg mb-2 overflow-hidden">
                        <img src="https://source.unsplash.com/100x100/?burger" class="w-full h-full object-cover">
                    </div>
                    <h3 class="font-bold text-sm text-gray-800">Burger Murah</h3>
                    <p class="text-xs text-gray-500 mb-2">Warung AW</p>
                    <div class="flex justify-between items-center">
                        <span class="text-green-600 font-bold text-sm">Rp8.000</span>
                        <button class="bg-green-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center" onclick="addToCart('Burger', 8000)">+</button>
                    </div>
                </a>

                 <!-- Produk 3 -->
                 <a href="detail.html" class="bg-white p-3 rounded-xl shadow-sm hover:shadow-md transition block">
                    <div class="h-24 bg-gray-200 rounded-lg mb-2 overflow-hidden">
                        <img src="https://source.unsplash.com/100x100/?drink" class="w-full h-full object-cover">
                    </div>
                    <h3 class="font-bold text-sm text-gray-800">Es Teh Manis</h3>
                    <p class="text-xs text-gray-500 mb-2">Warung AW</p>
                    <div class="flex justify-between items-center">
                        <span class="text-green-600 font-bold text-sm">Rp3.000</span>
                        <button class="bg-green-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center" onclick="addToCart('Es Teh', 3000)">+</button>
                    </div>
                </a>

            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bg-white border-t p-4 flex justify-around items-center sticky bottom-0 z-10">
            <a href="#" class="text-green-600 flex flex-col items-center text-xs">
                <i class="fas fa-home text-xl mb-1"></i> Home
            </a>
            <a href="#" class="text-gray-400 flex flex-col items-center text-xs">
                <i class="fas fa-search text-xl mb-1"></i> Cari
            </a>
            <a href="cart.html" class="text-gray-400 flex flex-col items-center text-xs">
                <i class="fas fa-shopping-cart text-xl mb-1"></i> Keranjang
                <!-- Badge Keranjang -->
                <span id="cart-badge" class="hidden absolute top-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full text-center leading-4 ml-4">0</span>
            </a>
            <a href="#" class="text-gray-400 flex flex-col items-center text-xs">
                <i class="fas fa-user text-xl mb-1"></i> Akun
            </a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
